<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1c1c1f"/>
      <stop offset="100%" stop-color="#0a0a0c"/>
    </linearGradient>
    <radialGradient id="bloom" cx=".5" cy=".5" r=".5">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="60%"  stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb" cx=".38" cy=".33" r=".72">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="55%"  stop-color="#f5f5f4"/>
      <stop offset="100%" stop-color="#a8a29e"/>
    </radialGradient>
  </defs>

  <!-- Rounded dark background with a soft white border -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <rect x="4" y="4" width="504" height="504" rx="104" fill="none" stroke="#ffffff" stroke-width="4" stroke-opacity="0.28"/>

  <!-- Soft bloom behind the orb -->
  <circle cx="256" cy="238" r="210" fill="url(#bloom)"/>

  <!-- Horizon line: two-tone white for depth -->
  <line x1="68"  y1="392" x2="444" y2="392" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.28"/>
  <line x1="128" y1="392" x2="384" y2="392" stroke="#ffffff" stroke-width="1" stroke-linecap="round" opacity="0.55"/>

  <!-- The orb -->
  <circle cx="256" cy="238" r="132" fill="url(#orb)"/>

  <!-- Pixel specular highlights on the orb -->
  <rect x="204" y="170" width="14" height="14" fill="#ffffff" opacity="0.95"/>
  <rect x="226" y="192" width="9"  height="9"  fill="#ffffff" opacity="0.85"/>
  <rect x="192" y="198" width="7"  height="7"  fill="#ffffff" opacity="0.7"/>
  <rect x="246" y="174" width="7"  height="7"  fill="#ffffff" opacity="0.68"/>
  <rect x="216" y="210" width="5"  height="5"  fill="#ffffff" opacity="0.55"/>

  <!-- Drifting pixel-sparkles — flecks of memory floating around the orb -->
  <rect x="88"  y="144" width="8" height="8" fill="#ffffff" opacity="0.88"/>
  <rect x="78"  y="168" width="5" height="5" fill="#ffffff" opacity="0.55"/>
  <rect x="108" y="120" width="4" height="4" fill="#ffffff" opacity="0.5"/>
  <rect x="420" y="170" width="8" height="8" fill="#ffffff" opacity="0.88"/>
  <rect x="432" y="152" width="5" height="5" fill="#ffffff" opacity="0.55"/>
  <rect x="404" y="124" width="4" height="4" fill="#ffffff" opacity="0.5"/>
  <rect x="122" y="322" width="6" height="6" fill="#ffffff" opacity="0.7"/>
  <rect x="388" y="328" width="6" height="6" fill="#ffffff" opacity="0.7"/>
  <rect x="70"  y="252" width="4" height="4" fill="#ffffff" opacity="0.5"/>
  <rect x="440" y="260" width="4" height="4" fill="#ffffff" opacity="0.5"/>
</svg>
