name: TUI CI

on:
  push:
    branches: [main]
    paths:
      - 'tui/**'
      - '.github/workflows/tui-ci.yml'
  pull_request:
    paths:
      - 'tui/**'
      - '.github/workflows/tui-ci.yml'

permissions:
  contents: read

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: tui/go.mod
          cache: true
          cache-dependency-path: tui/go.sum

      - name: go vet
        working-directory: tui
        run: go vet ./...

      - name: go test
        working-directory: tui
        run: go test ./... -count=1 -race

      - name: build
        working-directory: tui
        env:
          CGO_ENABLED: '0'
        run: go build -o /tmp/memoire ./cmd/memoire

      - name: govulncheck
        working-directory: tui
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          $(go env GOPATH)/bin/govulncheck ./...
