name: Renovate

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"  # Mondays at 8am UTC (matches renovate.json schedule)

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: renovatebot/github-action@v46
        with:
          configurationFile: renovate.json
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN || github.token }}
