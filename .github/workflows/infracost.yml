name: Infracost

on:
  pull_request:
    paths:
      - terraform/**

jobs:
  infracost:
    name: Cost estimate diff
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      # Generate cost estimate for the base branch so we can diff against it.
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          path: base

      - name: Generate base branch cost estimate
        run: |
          infracost breakdown \
            --path=base/terraform \
            --format=json \
            --out-file=/tmp/infracost-base.json

      # Generate cost estimate for this PR and diff against the base.
      - name: Generate PR cost diff
        run: |
          infracost diff \
            --path=terraform \
            --format=json \
            --compare-to=/tmp/infracost-base.json \
            --out-file=/tmp/infracost-diff.json

      # Post or update a single comment on the PR — no comment spam on re-pushes.
      - name: Post cost diff comment
        run: |
          infracost comment github \
            --path=/tmp/infracost-diff.json \
            --repo=$GITHUB_REPOSITORY \
            --github-token=${{ github.token }} \
            --pull-request=${{ github.event.pull_request.number }} \
            --behavior=update
